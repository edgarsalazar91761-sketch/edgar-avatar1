    "Explain the FIN to me like I'm a new client":"Your FIN is your Financial Independence Number. But here's what most people miss: it's not just a number, it's a SYSTEM. The system that separates the 1% from everyone else. The 95% save linearly and die broke. The 1% build exponential wealth machines. Your FIN is the target. The system is how you hit it. Ready to build the system?",
    "Run Mario Arrizon's full FIN script on me word for word":"PART 01 - OPENING\n\nWelcome & Frame the Call:\n\"Alright—let me tell you exactly what I do. Most families out there work incredibly hard, but when it comes to retirement, about 95% of Americans are still struggling just to get by. Another 4% are doing okay, but they're still stressed. My goal is to get you into that top 1% where you actually have financial peace of mind and never have to sweat about bills again. And the absolute first step to getting there is finding out your FIN number. Have you guys ever heard of a FIN number before?\"\n\nDefine the FIN Number:\n\"Most people haven't, because they don't teach this stuff in school. Your FIN stands for your Financial Independence Number. It is hands-down the most important number you'll ever know. It's the amount you need to have invested so that you can live completely off the interest for the rest of your life and never have to work for money ever again.\"\n\nEstablish the 1–10 Commitment:\n\"Look at it this way: on a scale of 1 to 10—a 1 means you don't care at all, you can be living under a bridge at retirement; a 10 means financial security is everything to you, and you want to make sure your family is completely set. Where do you guys see yourselves right now?\"\n\nPart 02 - THE FIN REVEAL\n\n\"Because of inflation over the next years, your desired income is going to look like even more a month down the road just to have the exact same purchasing power. That means your FIN number—your Financial Independence Number—is [calculated amount].\"\n\n\"It is a lot of money. But here's why it's that high: that is the exact amount you need so you can comfortably pull out what you need every year and never have to worry about running out of money. That's what real financial freedom looks like.\"\n\nPart 03 - PAY YOURSELF FIRST\n\n\"When it comes to our finances, most people get a paycheck, and before the money even hits their account, they pay everyone else t path?\n\nThat's exactly what I like to hear. You're doing the right thing for your family.\"",

    "Explain the 95 4 1 breakdown":"95% die broke because they think linearly. No system. 4% have some assets but still trade time = not free. 1% have exponential wealth machines running. The question isn't which are YOU — it's which SYSTEM are you building? Because your system determines your outcome. This is billionaire thinking: design the system first, then execute it.",
    "Teach me the Rule of 72":"Rule of 72 is the LEVERAGE EQUATION. 72 ÷ your return = years to double. At 3% (bank), double in 24 years. At 9%, double in 8 years. At 12%, double in 6 years. Most people stay broke because they're compounding at 3%. Billionaires compress decades by compounding at 9-12%. The system that separates them? Better return rate. That's it. One leverage point.",
    "Show me the cost of waiting to save":"Waiting is the MOST EXPENSIVE decision you'll make. To hit $1M by 67:\n- Age 27: $214/month\n- Age 37: $541/month (2.5x more)\n- Age 47: $1,491/month (7x more)\n- Age 57: $5,168/month (24x more)\n\nEvery year you delay = exponentially higher cost. This is why billionaires start young. They understand compound leverage. Time IS your biggest asset. Waste it = exponential disadvantage.",

    "Explain pay yourself first":"Most people: earn → spend everything → save what's left (nothing). Billionaires: earn → pay themselves FIRST → live on what's left. It's not discipline. It's a SYSTEM. Automate it. Money goes straight to investments before you even see it. System > willpower. Always."

    "Do an FNA with every client":"Every. Single. One. Rich, poor, doesn't matter. FNA first. Reason: You can't propose a solution without understanding the problem. The FNA is where you uncover the real need. Without it, you're just pitching products. With it, you're solving problems.",
    "iPhone subscriptions trick":"This is a real money conversation you can have with ANY prospect. 'Go to Settings, click your name, click Subscriptions, and cancel what you don't need.' Clients find $50-300 per month they don't know they're spending. You just freed up cash for their insurance. That's value-add.",
    "Use this closing question":"'If I can share with you how we'd be a millionaire in retirement, is there any reason why you wouldn't start the investments here?' This assumes yes and makes them justify a no. It's powerful because it's assumptive + benefit-focused + assumptive close all in one sentence.",
    "Rule of 72 deep dive":"72 ÷ return rate = years to double your money. 72 ÷ 12% = 6 years. 72 ÷ 9% = 8 years. 72 ÷ 3% = 24 years. This is THE conversation killer because numbers don't lie. Show them: invest at 9-12% or stay broke at 3%. There's no middle ground when the math is this stark.",
    "No mutual fund in history has gone insolvent":"Fact: Zero. Never happened. The mutual fund system is protected. Your money is YOUR money. The company could fail — your mutual fund holdings are protected. Tell this to anyone who says 'What if the fund goes under?' It's never happened in history.",
    "6 market crashes in 88 years, 48 upsides after":"In the last 88 years: 6 major market crashes. AFTER each crash: 48 market upswings of 12%+ within 12 months. Translation: Every crash is followed by a recovery. ALWAYS. If you panic and sell during a crash, you miss the recovery. Time in market beats timing the market. ALWAYS.",
    "Add value to yourself when speaking to prospects":"Nobody cares that you work for Primerica. They care that you know stuff. Study your topic. Read the material. Know IUL better than the IUL agent. Know term better than anyone. When you speak with authority, people listen. When you're just reading a script, nobody cares.",
    "First appointment is a discovery call":"It's NOT a sales call. You're discovering: their income, their debt, their fears, their goals, their protection gaps. You're a detective. You ask questions. You listen. You DON'T pitch. If you pitch on call 1, you've lost them. Discovery first. Close later.",
    "The poor save, the wealthy invest":"The poor: 'I'll save $50 from each paycheck.' Then they spend it. The wealthy: 'I'll invest $50 from each paycheck.' That money goes to work. It compounds. Ten years later: $50 difference is $100k+ difference. Savings = treading water. Investing = building wealth.",
    "You need a securities license for Variable Life":"Fact: Variable Life = client bears investment risk. You MUST be licensed (Series 6 or 7). If you sell Variable Life without a license, you're breaking the law. Don't do this. Get licensed or don't sell Variable Life. There's no gray area.",
    "Do right by the client, always":"Long game: do what's right for the client = they're a client for LIFE. Their family, their friends. Referrals. Respect. Money forever. Short game: do what's best for YOU = big commission upfront, client hates you, you never see them again. Pick the long game.",
    "IUL and Variable cost structure explainer":"IUL = Indexed Universal Life. Variable = Variable Universal Life. BOTH are built on Annual Renewable Term (ART) underneath. Translation: the cost of insurance INCREASES every single year. Not decreases. Increases. By year 30, you're paying 10x what you paid year 1. That's the trick.",
    "Variable Life policies mirror indices":"Variable Life is tied to the S&P 500 or other indices. When the market goes up 20%, your death benefit can go up. When it goes down 20%, your death benefit can go DOWN. Your family is depending on market performance. That's dangerous. Buy term instead.",
    "It's not timing the market, it's time in the market":"You'll never pick the bottom. You'll never pick the top. What WORKS: invest the same amount every month for 20+ years. Buy high, buy low, dollar-cost average your way to wealth. The investors who got rich weren't the smartest — they were the most patient.",
    "Show compound interest: 10, 20, 30 years":"Never show just 20 years. Show THREE scenarios: 10 years (wow, decent growth), 20 years (very good), 30 years (holy crap). This pattern hits them emotionally. They see: 'If I start NOW, by age 67, I'm RICH.' If you only show 20 years, they don't feel the urgency.",
    "The least-worst permanent policy is Variable":"If someone insists on permanent insurance (they're wrong, but they insist): Variable is 'least bad' because at death, beneficiaries get face amount PLUS cash value. Whole Life and IUL: only face amount, cash value goes to insurance company. Variable is marginally better. But still sell TERM.",
    "Best investment funds: FELAX, FAGAX, FKDNX":"FELAX = Fidelity Emerging Markets. Strong growth, higher risk. FAGAX = Fidelity Aggressive Growth. Highest growth potential. FKDNX = Fidelity Balanced. More conservative. Know these tickers. Know the returns. Show them. Clients trust tickers more than words.",
    "Life insurance breakpoints you need to know":"$100k = 5% load. $150k = 5% load. $250k = 4% load. $500k = 3% load. $750k = 2% load. $1M = 1% load. The bigger the face amount, the lower the percentage cost. Show clients: 'Get to $250k and you save money.' Breakpoints drive behavior."

    "What is cost segregation?":"Cost segregation breaks down building costs by component: roof, HVAC, flooring. Each depreciates differently. You accelerate deductions on fast-depreciating pieces. Translation: $1M building = $600k deductible in year 1 instead of spread over 39 years. That's not tax planning — that's LEVERAGE. Time-shifted deductions = more cash compounding.",
    "Explain key man insurance":"Key man insurance isn't about the person — it's SYSTEM REDUNDANCY. If you die, business dies. Insurance payout keeps business alive, pays debt, funds replacement. You're not insuring a person — you're insuring business continuity. Billionaires understand: business without redundancy = system failure waiting to happen.",

    "Tell me about Primerica":"Primerica isn't a company — it's a SYSTEM for building financially independent families. Founded 1977. 5.5M protected. $4.8M in claims paid DAILY. 14 countries. We've cracked the code on three things: (1) Protecting income (term insurance), (2) Building wealth (index funds), (3) Debt elimination (strategic planning). Most companies do one. We design the entire system.",

let mode="fin",hist=[],busy=false;

function tabs(){
  const html=MODES.map(m=>`<button class="tab${m.k===mode?" on":""}" data-mode="${m.k}">${m.l}</button>`).join("");
  const c=document.getElementById("tabs");
  c.innerHTML=html;
  c.querySelectorAll(".tab").forEach(b=>b.addEventListener("click",()=>sw(b.dataset.mode)));
}

function qbtns(){
  const html=(QQ[mode]||[]).map((b,i)=>`<button class="q" data-msg="${b.m}">${b.l}</button>`).join("");
  const c=document.getElementById("qb");
  c.innerHTML=html;
  c.querySelectorAll(".q").forEach(b=>b.addEventListener("click",()=>go(b.dataset.msg)));
}

function sw(m){
  mode=m;
  hist=[];
  tabs();
  qbtns();
  document.getElementById("chat").innerHTML="";
  addMsg("e",GR[m]);
}

function addMsg(r,t){
  const c=document.getElementById("chat");
  const d=document.createElement("div");
  d.className="msg"+(r==="u"?" u":"");
  d.innerHTML=`<div class="ico ${r}">${r==="u"?"You":"E"}</div><div class="bbl ${r}">${t.replace(/\n/g,"<br>")}</div>`;
  c.appendChild(d);
  c.scrollTop=c.scrollHeight;
}

function getResponse(txt){
  const modeResponses=RESPONSES[mode]||{};
  if(modeResponses[txt]){
    return modeResponses[txt];
  }
  for(let key in modeResponses){
    if(txt.toLowerCase().includes(key.toLowerCase())){
      return modeResponses[key];
    }
  }
  return "That's a great question. Tell me more about what you're thinking.";
}

function go(txt){
  if(!txt){
    const i=document.getElementById("inp");
    txt=i.value.trim();
    if(!txt||busy)return;
    i.value="";
  }
  if(busy)return;
  busy=true;
  addMsg("u",txt);
  hist.push({role:"user",content:txt});
  
  setTimeout(()=>{
    const rep=getResponse(txt);
    hist.push({role:"assistant",content:rep});
    addMsg("e",rep);
    busy=false;
  },600);
}

document.getElementById("inp").addEventListener("keydown",e=>{if(e.key==="Enter")go();});
document.getElementById("sendbtn").addEventListener("click",()=>go());
tabs();
qbtns();
addMsg("e",GR["fin"]);
